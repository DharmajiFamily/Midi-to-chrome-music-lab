<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI to Shared Piano Link Generator</title>
    <!-- Importing ToneJS Midi library to parse MIDI inside the browser -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #fafafa; }
        .box { border: 2px dashed #ccc; padding: 30px; border-radius: 8px; background: white; max-width: 400px; margin: 0 auto; }
        button { background: #4285F4; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; }
        #output { margin-top: 20px; word-break: break-all; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Shared Piano MIDI Linker</h1>
    <div class="box">
        <input type="file" id="file-input" accept=".mid,.midi">
        <br>
        <button onclick="processMidi()">Generate Shared Piano Data</button>
    </div>
    <div id="output"></div>

    <script>
        async function processMidi() {
            const fileInput = document.getElementById('file-input');
            const outputDiv = document.getElementById('output');
            
            if (!fileInput.files.length) {
                outputDiv.innerText = "Please select a MIDI file first.";
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                const midi = new Midi(e.target.result);
                let convertedNotes = [];

                // Loop through all tracks and convert notes
                midi.tracks.forEach(track => {
                    track.notes.forEach(note => {
                        // Math conversion: Multiply real seconds by 60 for Google's tracking unit
                        const startTime60th = Math.round(note.time * 60);
                        const endTime60th = Math.round((note.time + note.duration) * 60);
                        
                        // Structure: [NoteNumber, ColorID, Velocity, StartTick, EndTick]
                        // Color ID 0-5 switches emoji templates. Velocity scales 0.0 to 1.0
                        convertedNotes.push([
                            note.midi, 
                            0, 
                            note.velocity, 
                            startTime60th, 
                            endTime60th
                        ]);
                    });
                });

                // Sort notes sequentially by start time
                convertedNotes.sort((a, b) => a[3] - b[3]);

                // Calculate the final full song duration in 60th-of-a-second intervals
                const finalElapsed = convertedNotes.length > 0 ? convertedNotes[convertedNotes.length - 1][4] : 0;

                // Build Google's structure format
                const finalPayload = {
                    notes: convertedNotes,
                    elapsed: finalElapsed,
                    instrument: "piano", // Options: "piano", "marimba", "strings", "synth", "drum"
                    keyMap: {}
                };

                outputDiv.innerHTML = `<p>Successfully converted ${convertedNotes.length} notes!</p>
                <textarea rows="10" cols="40">${JSON.stringify(finalPayload)}</textarea>
                <p>Next step: Send an HTTP POST request with this payload to Google's database server to get your random URL ID hash back.</p>`;
            };

            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>

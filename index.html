<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Density MIDI Shared Piano Linker</title>
    <!-- Optimized ToneJS MIDI engine -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 30px; background: #121212; color: #e0e0e0; }
        .box { border: 2px dashed #ff3366; padding: 30px; border-radius: 12px; background: #1e1e1e; max-width: 450px; margin: 0 auto; box-shadow: 0 6px 15px rgba(255,51,102,0.15); }
        button { background: #ff3366; color: white; padding: 14px 28px; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; font-size: 15px; width: 100%; }
        button:disabled { background: #555; cursor: not-allowed; }
        #output { margin-top: 25px; word-break: break-all; padding: 15px; border-radius: 6px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .success-link { display: inline-block; margin-top: 12px; color: #ff3366; font-weight: bold; font-size: 15px; text-decoration: none; border: 2px solid #ff3366; padding: 12px; border-radius: 6px; background: rgba(255,51,102,0.1); word-break: break-all; }
        .status-msg { color: #f4b400; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Rush-E Ready Shared Piano Linker</h1>
    <p>Upload massive, high-speed MIDI files smoothly directly from your mobile browser.</p>
    
    <div class="box">
        <input type="file" id="file-input" accept=".mid,.midi">
        <br>
        <button id="gen-btn" onclick="processRushMidi()">Generate Live Share Link</button>
    </div>

    <div id="output"></div>

    <script>
        async function processRushMidi() {
            const fileInput = document.getElementById('file-input');
            const outputDiv = document.getElementById('output');
            const btn = document.getElementById('gen-btn');
            
            if (!fileInput.files.length) {
                outputDiv.innerHTML = "<span style='color:#ff4444;'>Please select a MIDI file first.</span>";
                return;
            }

            btn.disabled = true;
            outputDiv.innerHTML = "<p class='status-msg'>Parsing high-density notes... (This can take a moment for Rush E)</p>";

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const midi = new Midi(e.target.result);
                    let convertedNotes = [];

                    // 1. Flatten all tracks into a singular processing pipeline
                    midi.tracks.forEach(track => {
                        track.notes.forEach(note => {
                            // Convert real seconds to Google's 1/60th second time blocks
                            const startTime60th = Math.round(note.time * 60);
                            const endTime60th = Math.round((note.time + note.duration) * 60);
                            
                            // Format payload data: [NoteNumber, ColorID, Velocity, StartTick, EndTick]
                            convertedNotes.push([
                                note.midi, 
                                0, 
                                parseFloat(note.velocity.toFixed(2)), // Keep payload lightweight
                                startTime60th, 
                                endTime60th
                            ]);
                        });
                    });

                    if (convertedNotes.length === 0) {
                        throw new Error("No readable note tracks detected in this MIDI file.");
                    }

                    // 2. Sort chronologically so Google's interpreter reads the timeline correctly
                    convertedNotes.sort((a, b) => a[3] - b[3]);

                    // 3. CAP NOTE EVENT DENSITY (Prevents Google's cloud server from rejecting the file payload)
                    const MAX_ALLOWED_NOTES = 4500; 
                    if (convertedNotes.length > MAX_ALLOWED_NOTES) {
                        outputDiv.innerHTML += `<p style="color:#f4b400; font-size:12px;">Notice: MIDI file has ${convertedNotes.length} notes. Compressed down to the safest maximum (${MAX_ALLOWED_NOTES} notes) to keep Google from rejecting the song!</p>`;
                        convertedNotes = convertedNotes.slice(0, MAX_ALLOWED_NOTES);
                    }

                    const finalElapsed = convertedNotes[convertedNotes.length - 1][4];

                    // Structural format validation schema for Chrome Music Lab database
                    const googlePayload = {
                        notes: convertedNotes,
                        elapsed: finalElapsed,
                        instrument: "piano", 
                        keyMap: {}
                    };

                    outputDiv.innerHTML = "<p class='status-msg'>Uploading your optimized arrangement to the cloud...</p>";

                    // Router proxy to hand-deliver requests to Google's private backend endpoint
                    const proxyUrl = "https://herokuapp.com";
                    const googleDatabaseApi = "https://musiclab.chromeexperiments.com/Shared-Piano/saved/";

                    const response = await fetch(proxyUrl + googleDatabaseApi, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(googlePayload)
                    });

                    if (!response.ok) {
                        throw new Error("Google's cloud database rejected the file size. Try an optimized or trimmed Rush E file variant.");
                    }

                    const resultData = await response.json();
                    const sharedPianoHashId = resultData.id; 
                    const finalGoogleUrl = `https://chromeexperiments.com{sharedPianoHashId}`;

                    outputDiv.innerHTML = `
                        <p style='color:#0f9d58; font-weight:bold;'>Rush E Generation Complete!</p>
                        <p>Copy and send this link to your friends:</p>
                        <a class="success-link" href="${finalGoogleUrl}" target="_blank">${finalGoogleUrl}</a>
                    `;

                } catch (error) {
                    outputDiv.innerHTML = `<span style='color:#ff4444;'>Error: ${error.message}<br><small>If it fails, use a "Piano Solo" version of Rush E rather than a massive "Black MIDI" version.</small></span>`;
                } finally {
                    btn.disabled = false;
                }
            };

            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>

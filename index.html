<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme MIDI Linker (Rush E Fixed)</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 30px; background: #0b0b0e; color: #f0f0f5; }
        .box { border: 2px dashed #7289da; padding: 30px; border-radius: 12px; background: #18191c; max-width: 450px; margin: 0 auto; box-shadow: 0 8px 24px rgba(114,137,218,0.2); }
        button { background: #7289da; color: white; padding: 14px 28px; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; font-size: 15px; width: 100%; transition: 0.2s; }
        button:disabled { background: #4f545c; cursor: not-allowed; }
        #output { margin-top: 25px; word-break: break-all; padding: 15px; border-radius: 6px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .success-link { display: inline-block; margin-top: 12px; color: #00fff0; font-weight: bold; font-size: 15px; text-decoration: none; border: 2px solid #7289da; padding: 12px; border-radius: 6px; background: rgba(114,137,218,0.1); word-break: break-all; }
        .status-msg { color: #faa61a; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Rush E Intelligent Linker</h1>
    <p>Smart filters automatically down-sample massive Black MIDIs so Google's server accepts them.</p>
    
    <div class="box">
        <input type="file" id="file-input" accept=".mid,.midi">
        <br>
        <button id="gen-btn" onclick="processExtremeMidi()">Generate Live Share Link</button>
    </div>

    <div id="output"></div>

    <script>
        async function processExtremeMidi() {
            const fileInput = document.getElementById('file-input');
            const outputDiv = document.getElementById('output');
            const btn = document.getElementById('gen-btn');
            
            if (!fileInput.files.length) {
                outputDiv.innerHTML = "<span style='color:#f04747;'>Please select your Rush E MIDI file.</span>";
                return;
            }

            btn.disabled = true;
            outputDiv.innerHTML = "<p class='status-msg'>Filtering impossible notes... (Cleaning Black MIDI tracks)</p>";

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const midi = new Midi(e.target.result);
                    let rawNotes = [];

                    // 1. Flatten all complex multitracks into a unified array
                    midi.tracks.forEach(track => {
                        track.notes.forEach(note => {
                            const startTick = Math.round(note.time * 60);
                            const endTick = Math.round((note.time + note.duration) * 60);
                            rawNotes.push({
                                midi: note.midi,
                                velocity: parseFloat(note.velocity.toFixed(2)),
                                start: startTick,
                                end: endTick
                            });
                        });
                    });

                    if (rawNotes.length === 0) throw new Error("No notes found.");

                    // 2. Sort all notes chronologically
                    rawNotes.sort((a, b) => a.start - b.start);

                    // 3. INTELLIGENT POLYPHONY FILTER: Prevent server overload
                    // If multiple notes strike at the exact same fraction of time, 
                    // cap the maximum vertical note width to keep the melody but shred the lag.
                    let filteredNotes = [];
                    let timeMap = {};
                    const MAX_NOTES_PER_TICK = 6; // Max notes allowed to play at the absolute exact same microsecond

                    rawNotes.forEach(note => {
                        if (!timeMap[note.start]) {
                            timeMap[note.start] = 0;
                        }
                        
                        if (timeMap[note.start] < MAX_NOTES_PER_TICK) {
                            filteredNotes.push([
                                note.midi,
                                0, // Color ID
                                note.velocity,
                                note.start,
                                note.end
                            ]);
                            timeMap[note.start]++;
                        }
                    });

                    // 4. MAXIMUM SAFE CLIP SAFEGUARD
                    // Hard cutoff cap at Google's absolute storage ceiling (4,500 notes)
                    const SERVER_LIMIT = 4500;
                    let wasTrimmed = false;
                    if (filteredNotes.length > SERVER_LIMIT) {
                        filteredNotes = filteredNotes.slice(0, SERVER_LIMIT);
                        wasTrimmed = true;
                    }

                    const finalElapsed = filteredNotes[filteredNotes.length - 1][4];

                    // Google JSON Schema
                    const googlePayload = {
                        notes: filteredNotes,
                        elapsed: finalElapsed,
                        instrument: "piano",
                        keyMap: {}
                    };

                    outputDiv.innerHTML = "<p class='status-msg'>Injecting payload safely into Google server...</p>";

                    // Proxy to bypass CORS block on mobile browsers
                    const proxyUrl = "https://herokuapp.com";
                    const googleDatabaseApi = "https://musiclab.chromeexperiments.com/Shared-Piano/saved/";

                    const response = await fetch(proxyUrl + googleDatabaseApi, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(googlePayload)
                    });

                    if (!response.ok) {
                        throw new Error("Payload size still too large. Try a slightly shorter cut of the track.");
                    }

                    const resultData = await response.json();
                    const sharedPianoHashId = resultData.id; 
                    const finalGoogleUrl = `https://chromeexperiments.com{sharedPianoHashId}`;

                    let noticeText = wasTrimmed ? "<br><small style='color:#faa61a;'>Note: File compression compressed the timeline to protect server limits.</small>" : "";

                    outputDiv.innerHTML = `
                        <p style='color:#43b581; font-weight:bold;'>Extreme Link Generated successfully!</p>
                        <p>Copy this and send to your friends:</p>
                        <a class="success-link" href="${finalGoogleUrl}" target="_blank">${finalGoogleUrl}</a>
                        ${noticeText}
                    `;

                } catch (error) {
                    outputDiv.innerHTML = `<span style='color:#f04747;'>Error: ${error.message}</span>`;
                } finally {
                    btn.disabled = false;
                }
            };

            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
